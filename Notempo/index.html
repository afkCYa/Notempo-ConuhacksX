<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sheet Music Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.0/build/opensheetmusicdisplay.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="pdfGenerator.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #osmd-container {
            width: 800px;  /* A4 width at 96dpi */
            height: auto;   /* Let it expand naturally */
            overflow: visible;
            border: 1px solid #ccc;
            margin: 20px auto;  /* Center it */
            background: white;
        }

        #upload-bar {
            margin-bottom: 15px;
        }

        button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>Music sheet!</h1>

    <p>Instruction: unzip the file from Musescore and upload the .mxl file</p>
    <!-- Upload button -->
    <div id="upload-bar">
        <input type="file" id="fileInput" accept=".musicxml,.mxl">
        <button onclick="loadFile(event)">Load sheet</button>
        <button id="downloadPdfBtn" onclick="downloadAsPDF()" disabled>Download as PDF</button>
    </div>

    <div id="osmd-container"></div>

    <script>
        const osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(
            document.getElementById("osmd-container"),
            {
                autoResize: true,
                pageFormat: "A4"
            }
        );

        let currentSheetName = null;

        async function loadFile(event) {
            const inputEl = document.getElementById('fileInput');
            const file = inputEl.files[0];
            if (!file) {
                alert('Please choose a .mxl or .musicxml file first.');
                return;
            }

            const form = new FormData();
            form.append('file', file);

            const button = event ? event.target : null;
            const prevText = button ? button.innerText : null;
            if (button) button.innerText = 'Uploading...';

            try {
                const resp = await fetch('/upload', { method: 'POST', body: form });
                if (!resp.ok) {
                    const txt = await resp.text();
                    throw new Error(txt || 'Upload failed');
                }
                const data = await resp.json();
                currentSheetName = file.name.split('.')[0];
                const fileUrl = (data.file_url.startsWith('/') ? data.file_url : '/' + data.file_url) + '?t=' + Date.now();

                await osmd.load(fileUrl);
                osmd.render();

                // Enable PDF download button
                document.getElementById('downloadPdfBtn').disabled = false;
            } catch (err) {
                alert('Error: ' + err.message);
                console.error(err);
            } finally {
                if (button) button.innerText = prevText;
            }
        }

        async function downloadAsPDF() {
            const btn = document.getElementById('downloadPdfBtn');
            const prevText = btn.innerText;
            btn.innerText = 'Generating PDF...';
            btn.disabled = true;

            try {
                const container = document.getElementById('osmd-container');
                const filename = currentSheetName ? currentSheetName + '_sheet' : 'sheet';
                await generateAndDownloadPDF(container, filename);
            } catch (err) {
                alert('Error: ' + err.message);
                console.error(err);
            } finally {
                btn.innerText = prevText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
